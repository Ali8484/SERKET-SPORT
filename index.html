<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🏋️ Serket Sport | 5 أسئلة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a2f3f 0%, #0f2835 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0.5rem;
            position: relative;
            overflow: hidden; /* منع التمرير على مستوى الجسم */
        }

        .game-container {
            max-width: 500px;
            width: 100%;
            height: 98vh; /* استخدام 98% من ارتفاع الشاشة */
            max-height: 850px;
            background: rgba(10, 30, 40, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 180, 70, 0.25);
            border-radius: 1.8rem;
            padding: 0.8rem 0.8rem 0.5rem;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.6), inset 0 1px 2px rgba(255, 215, 150, 0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden; /* منع التمرير داخل الحاوية */
        }

        /* شعار ورأس اللعبة - مضغوط جداً */
        .game-header {
            text-align: center;
            margin-bottom: 0.3rem;
            flex-shrink: 0;
        }

        .game-title {
            font-size: clamp(1.4rem, 5vw, 2rem);
            font-weight: 800;
            background: linear-gradient(135deg, #ffb347, #ffa01e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 4px 15px rgba(255, 160, 30, 0.3);
            letter-spacing: -0.5px;
            line-height: 1.1;
        }

        .store-badge {
            display: inline-block;
            background: #233b48;
            color: #ffbc6c;
            font-weight: 600;
            font-size: 0.75rem;
            padding: 0.25rem 1rem;
            border-radius: 50px;
            border: 1px solid #ffb34780;
            box-shadow: 0 2px 6px #00000040;
            margin-top: 0.1rem;
            backdrop-filter: blur(4px);
        }

        /* زر التحكم بالصوت - مصغر */
        .sound-control {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 0.2rem;
            flex-shrink: 0;
        }

        .sound-toggle {
            background: #1d3643;
            border: 1px solid #ffb34780;
            color: #ffbc6c;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 0 #0f1f28;
        }

        .sound-toggle:active {
            transform: translateY(2px);
            box-shadow: 0 0px 0 #0f1f28;
        }

        /* شريط التقدم والنتيجة - مضغوط */
        .stats-bar {
            display: flex;
            flex-wrap: nowrap;
            justify-content: space-between;
            align-items: center;
            gap: 0.3rem;
            background: #1d3643;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            border: 1px solid #3f6375;
            margin-bottom: 0.5rem;
            box-shadow: inset 0 2px 5px #0f1f28;
            flex-shrink: 0;
        }

        .question-counter {
            color: #d4e9ff;
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.2rem;
        }

        .counter-number {
            background: #ffb347;
            color: #1e2c35;
            padding: 0.1rem 0.7rem;
            border-radius: 30px;
            font-weight: 700;
            margin-right: 0.3rem;
            font-size: 0.9rem;
        }

        .score-badge {
            background: #ffb347;
            color: #1e2c35;
            padding: 0.2rem 1rem;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 700;
            min-width: 50px;
            text-align: center;
            box-shadow: 0 2px 0 #b16f1a;
        }

        .progress-track {
            width: 100%;
            height: 6px;
            background: #1d3643;
            border-radius: 10px;
            margin-bottom: 0.6rem;
            overflow: hidden;
            border: 1px solid #3e6375;
            flex-shrink: 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffbc6c, #ff9f3d);
            width: 0%;
            border-radius: 10px;
            transition: width 0.3s ease;
            box-shadow: 0 0 8px #ffb347;
        }

        /* بطاقة السؤال - مضغوطة جداً */
        .question-card {
            background: #233b48;
            border-radius: 1.2rem;
            padding: 0.7rem 0.9rem;
            border: 1px solid #3f5a68;
            box-shadow: inset 0 2px 5px #10232e, 0 8px 15px -8px #0a1e28;
            margin-bottom: 0.6rem;
            flex-shrink: 0;
        }

        #question-text {
            font-size: 1.1rem;
            line-height: 1.3;
            color: #f0f9ff;
            font-weight: 600;
            text-shadow: 0 1px 3px black;
            word-break: break-word;
        }

        /* منطقة الخيارات (الأزرار) - مضغوطة جداً مع إمكانية التمرير الداخلي الخفيف إذا لزم الأمر */
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            flex: 1 1 auto;
            overflow-y: auto; /* تمرير داخلي فقط إذا كانت الخيارات كثيرة */
            min-height: 0; /* مهم ليعمل overflow بشكل صحيح */
            padding: 0 0.1rem;
        }

        /* إخفاء شريط التمرير مع الاحتفاظ بالوظيفة */
        .options-grid::-webkit-scrollbar {
            width: 3px;
        }
        .options-grid::-webkit-scrollbar-track {
            background: #1d3643;
        }
        .options-grid::-webkit-scrollbar-thumb {
            background: #ffb347;
            border-radius: 10px;
        }

        .option-btn {
            background: #eef2f6;
            border: none;
            border-radius: 40px;
            padding: 0.7rem 1rem;
            font-size: 0.95rem;
            font-weight: 600;
            color: #1e2f3c;
            text-align: right;
            cursor: pointer;
            transition: all 0.1s ease;
            border: 1px solid transparent;
            box-shadow: 0 3px 0 #9aabbb, 0 4px 8px -3px #000000b0;
            width: 100%;
            line-height: 1.3;
            word-break: break-word;
        }

        .option-btn:active:not(:disabled) {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #8399ab, 0 3px 6px -3px black;
        }

        .option-btn.correct {
            background: #2e7d5a;
            color: white;
            border-color: #6ec89b;
            box-shadow: 0 2px 0 #1b5e3f;
        }

        .option-btn.wrong {
            background: #b53b3b;
            color: white;
            border-color: #e08a8a;
            box-shadow: 0 2px 0 #832525;
        }

        .option-btn:disabled {
            opacity: 0.9;
            cursor: not-allowed;
        }

        /* زر السؤال التالي - مصغر */
        .next-btn {
            background: #ffb347;
            border: none;
            border-radius: 40px;
            padding: 0.6rem 1.5rem;
            font-size: 1rem;
            font-weight: 700;
            color: #1e2c35;
            margin: 0.2rem auto 0.2rem;
            cursor: pointer;
            border: 2px solid #ffcf8a;
            box-shadow: 0 3px 0 #b16f1a;
            transition: 0.1s ease;
            width: fit-content;
            min-width: 150px;
            text-align: center;
            display: block;
        }

        .next-btn:active {
            transform: translateY(3px);
            box-shadow: 0 0px 0 #b16f1a;
        }

        /* شارات المزايا - مضغوطة جداً */
        .features-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.3rem 0.5rem;
            margin: 0.3rem 0 0.3rem;
            flex-shrink: 0;
        }

        .feature-item {
            background: #1d3643;
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            color: #bcd8e9;
            font-size: 0.65rem;
            font-weight: 500;
            border: 1px solid #3e6375;
            white-space: nowrap;
        }

        .feature-item i {
            font-style: normal;
            color: #ffbc6c;
            margin-left: 3px;
            font-size: 0.7rem;
        }

        /* زر إعادة التشغيل - مصغر */
        .restart-btn {
            background: #2e4b5c;
            border: 1px solid #547888;
            color: #eaf2f7;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            width: fit-content;
            margin: 0.2rem auto 0.1rem;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 3px 0 #17323f;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            border: none;
            flex-shrink: 0;
        }

        .restart-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #17323f;
        }

        .footer-note {
            text-align: center;
            color: #7fa3b8;
            font-size: 0.7rem;
            margin-top: 0.1rem;
            border-top: 1px dashed #3f6375;
            padding-top: 0.2rem;
            flex-shrink: 0;
        }

        /* ========== الرسالة العائمة المنبثقة (بدون تغيير) ========== */
        .floating-toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 9999;
            max-width: 350px;
            width: 85%;
            background: #233b48;
            border: 3px solid #ffb347;
            border-radius: 30px;
            padding: 1.2rem 1rem;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.9), 0 0 0 6px rgba(255, 180, 70, 0.2);
            color: white;
            text-align: center;
            animation: toastPop 0.3s ease forwards;
            backdrop-filter: blur(15px);
        }

        .floating-toast.winner-toast {
            border: 4px solid gold;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.9), 0 0 0 10px rgba(255, 215, 0, 0.25);
            background: linear-gradient(145deg, #1d3a48, #233b48);
        }

        @keyframes toastPop {
            0% { opacity: 0; transform: translate(-50%, -30%) scale(0.7); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        .toast-icon {
            font-size: 3rem;
            margin-bottom: 0.3rem;
            line-height: 1;
        }

        .toast-title {
            font-size: 1.6rem;
            font-weight: 800;
            color: #ffb347;
            margin-bottom: 0.5rem;
        }

        .winner-toast .toast-title {
            color: gold;
            font-size: 1.8rem;
        }

        .toast-message {
            font-size: 1rem;
            line-height: 1.5;
            color: #e1f0fc;
            margin-bottom: 0.8rem;
        }

        .discount-code {
            background: #1d2f3a;
            border: 2px dashed #ffb347;
            border-radius: 40px;
            padding: 0.6rem;
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: 3px;
            color: #ffb347;
            margin: 0.8rem 0;
            direction: ltr;
        }

        .winner-toast .discount-code {
            border-color: gold;
            color: gold;
        }

        .toast-close-btn {
            background: #ffb347;
            border: none;
            color: #1e2c35;
            font-weight: 700;
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            font-size: 1rem;
            margin-top: 0.5rem;
            cursor: pointer;
            border: 2px solid #ffd89c;
            box-shadow: 0 3px 0 #b16f1a;
        }

        .toast-close-btn:active {
            transform: translateY(3px);
            box-shadow: 0 0px 0 #b16f1a;
        }

        .toast-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 9998;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <div class="game-title">⚡ SERKET SPORT ⚡</div>
            <span class="store-badge">🏋️ 5 أسئلة - أهم المزايا</span>
        </div>

        <!-- زر التحكم بالصوت -->
        <div class="sound-control">
            <div class="sound-toggle" id="sound-toggle">🔊</div>
        </div>

        <!-- الإحصائيات -->
        <div class="stats-bar">
            <div class="question-counter">
                <span class="counter-number" id="current-q">1</span>
                <span>/</span>
                <span id="total-q">5</span>
            </div>
            <div class="score-badge" id="score-display">0</div>
        </div>
        <div class="progress-track">
            <div class="progress-fill" id="progress-fill" style="width: 0%;"></div>
        </div>

        <!-- السؤال -->
        <div class="question-card">
            <div id="question-text">جاري تحميل الأسئلة...</div>
        </div>

        <!-- الخيارات (قابلة للتمرير الخفيف إذا لزم الأمر) -->
        <div class="options-grid" id="options-container"></div>

        <!-- شارات الخدمات -->
        <div class="features-grid">
            <span class="feature-item"><i>🔧</i> تركيب مجاني</span>
            <span class="feature-item"><i>⚡</i> تقسيط</span>
            <span class="feature-item"><i>🛡️</i> ضمان سنتين</span>
            <span class="feature-item"><i>🚚</i> شحن سريع</span>
            <span class="feature-item"><i>💬</i> استشارات</span>
            <span class="feature-item"><i>🔄</i> إرجاع 14 يوم</span>
        </div>

        <!-- زر إعادة التشغيل -->
        <button class="restart-btn" id="restart-game">
            <span>↻</span> ابدأ جديداً
        </button>
        <div class="footer-note">"رياضتك .. أسلوب حياتك"</div>
    </div>

    <script>
        (function() {
            // ========== نظام الصوت المتطور ==========
            class SoundManager {
                constructor() {
                    this.muted = false;
                    this.audioCtx = null;
                    this.initialized = false;
                }

                init() {
                    if (this.initialized) return;
                    try {
                        this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                        this.initialized = true;
                    } catch (e) {
                        console.log('Web Audio API not supported');
                    }
                }

                ensureContext() {
                    if (!this.audioCtx) this.init();
                    if (this.audioCtx && this.audioCtx.state === 'suspended') {
                        this.audioCtx.resume();
                    }
                }

                playCorrect() {
                    if (this.muted || !this.audioCtx) return;
                    this.ensureContext();
                    
                    const now = this.audioCtx.currentTime;
                    
                    [523.25, 659.25, 783.99].forEach((freq, i) => {
                        const osc = this.audioCtx.createOscillator();
                        const gain = this.audioCtx.createGain();
                        
                        osc.type = 'sine';
                        osc.frequency.value = freq;
                        
                        gain.gain.setValueAtTime(0.2, now + i * 0.08);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.08 + 0.2);
                        
                        osc.connect(gain);
                        gain.connect(this.audioCtx.destination);
                        
                        osc.start(now + i * 0.08);
                        osc.stop(now + i * 0.08 + 0.2);
                    });
                }

                playWrong() {
                    if (this.muted || !this.audioCtx) return;
                    this.ensureContext();
                    
                    const now = this.audioCtx.currentTime;
                    
                    const osc = this.audioCtx.createOscillator();
                    const gain = this.audioCtx.createGain();
                    
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(261.63, now);
                    osc.frequency.setValueAtTime(196.00, now + 0.08);
                    osc.frequency.setValueAtTime(146.83, now + 0.16);
                    
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    
                    osc.connect(gain);
                    gain.connect(this.audioCtx.destination);
                    
                    osc.start(now);
                    osc.stop(now + 0.3);
                }

                playOkayButton() {
                    if (this.muted || !this.audioCtx) return;
                    this.ensureContext();
                    
                    const now = this.audioCtx.currentTime;
                    
                    const osc1 = this.audioCtx.createOscillator();
                    const osc2 = this.audioCtx.createOscillator();
                    const gain = this.audioCtx.createGain();
                    
                    osc1.type = 'sine';
                    osc1.frequency.value = 659.25;
                    osc2.type = 'triangle';
                    osc2.frequency.value = 523.25;
                    
                    gain.gain.setValueAtTime(0.12, now);
                    gain.gain.setValueAtTime(0.1, now + 0.03);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                    
                    osc1.connect(gain);
                    osc2.connect(gain);
                    gain.connect(this.audioCtx.destination);
                    
                    osc1.start(now);
                    osc2.start(now);
                    osc1.stop(now + 0.15);
                    osc2.stop(now + 0.15);
                    
                    const osc3 = this.audioCtx.createOscillator();
                    const gain2 = this.audioCtx.createGain();
                    osc3.type = 'sine';
                    osc3.frequency.value = 783.99;
                    gain2.gain.setValueAtTime(0.08, now + 0.07);
                    gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                    osc3.connect(gain2);
                    gain2.connect(this.audioCtx.destination);
                    osc3.start(now + 0.07);
                    osc3.stop(now + 0.15);
                }

                playNext() {
                    if (this.muted || !this.audioCtx) return;
                    this.ensureContext();
                    
                    const now = this.audioCtx.currentTime;
                    const osc = this.audioCtx.createOscillator();
                    const gain = this.audioCtx.createGain();
                    
                    osc.type = 'triangle';
                    osc.frequency.value = 392.00;
                    
                    gain.gain.setValueAtTime(0.12, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.12);
                    
                    osc.connect(gain);
                    gain.connect(this.audioCtx.destination);
                    
                    osc.start(now);
                    osc.stop(now + 0.12);
                }

                playRestart() {
                    if (this.muted || !this.audioCtx) return;
                    this.ensureContext();
                    
                    const now = this.audioCtx.currentTime;
                    
                    [523.25, 659.25, 783.99].forEach((freq, i) => {
                        const osc = this.audioCtx.createOscillator();
                        const gain = this.audioCtx.createGain();
                        
                        osc.type = 'sine';
                        osc.frequency.value = freq;
                        
                        gain.gain.setValueAtTime(0.15, now + i * 0.08);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.08 + 0.15);
                        
                        osc.connect(gain);
                        gain.connect(this.audioCtx.destination);
                        
                        osc.start(now + i * 0.08);
                        osc.stop(now + i * 0.08 + 0.15);
                    });
                }

                playWinnerSound() {
                    if (this.muted || !this.audioCtx) return;
                    this.ensureContext();
                    
                    const now = this.audioCtx.currentTime;
                    
                    const notes = [523.25, 659.25, 783.99, 1046.50, 1318.51];
                    notes.forEach((freq, i) => {
                        const osc = this.audioCtx.createOscillator();
                        const gain = this.audioCtx.createGain();
                        
                        osc.type = i % 2 === 0 ? 'sine' : 'triangle';
                        osc.frequency.value = freq;
                        
                        gain.gain.setValueAtTime(0.2, now + i * 0.08);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.08 + 0.3);
                        
                        osc.connect(gain);
                        gain.connect(this.audioCtx.destination);
                        
                        osc.start(now + i * 0.08);
                        osc.stop(now + i * 0.08 + 0.3);
                    });
                }

                toggleMute() {
                    this.muted = !this.muted;
                    return this.muted;
                }
            }

            const soundManager = new SoundManager();

            // ========== الأسئلة ==========
            const questions = [
                {
                    question: "🔧 ما الخدمة الإضافية عند شراء الأجهزة الكبيرة؟",
                    options: ["تركيب مجاني", "مدرب شخصي", "عضوية نادي", "هدية دمبلز"],
                    correct: 0,
                    feedback: "✅ تركيب مجاني للأجهزة الثقيلة في المنزل!"
                },
                {
                    question: "⚡ ما شركات التقسيط المتعاونة؟",
                    options: ["تمارا فقط", "تابي فقط", "تابي وتمارا", "فيونس وتمارا"],
                    correct: 2,
                    feedback: "✅ تعاون مع تابي وتمارا بدون فوائد!"
                },
                {
                    question: "🛡️ مدة الضمان على الأجهزة الكهربائية؟",
                    options: ["سنة", "سنتان", "6 أشهر", "3 سنوات"],
                    correct: 1,
                    feedback: "✅ ضمان سنتين كاملتين على جميع الأجهزة!"
                },
                {
                    question: "🔄 مهلة الإرجاع والتبادل؟",
                    options: ["7 أيام", "14 يوماً", "30 يوماً", "يومان"],
                    correct: 1,
                    feedback: "✅ إرجاع وتبادل خلال 14 يوماً!"
                },
                {
                    question: "💬 كيف يحصل العميل على الدعم؟",
                    options: ["واتساب", "زيارات منزلية", "خط ساخن", "مدرب خاص"],
                    correct: 0,
                    feedback: "✅ دعم فوري عبر الواتساب واستشارات مجانية!"
                }
            ];

            // متغيرات اللعبة
            let currentIdx = 0;
            let score = 0;
            let answered = false;
            const totalQ = questions.length;

            // عناصر DOM
            const qText = document.getElementById('question-text');
            const optsDiv = document.getElementById('options-container');
            const scoreSpan = document.getElementById('score-display');
            const currentQSpan = document.getElementById('current-q');
            const totalQSpan = document.getElementById('total-q');
            const progressFill = document.getElementById('progress-fill');
            const restartBtn = document.getElementById('restart-game');
            const soundToggle = document.getElementById('sound-toggle');

            totalQSpan.textContent = totalQ;

            soundToggle.addEventListener('click', () => {
                const muted = soundManager.toggleMute();
                soundToggle.textContent = muted ? '🔇' : '🔊';
                soundToggle.classList.toggle('muted', muted);
            });

            function showFloatingMessage(isCorrect, feedbackText, correctAnswerText = null) {
                const existingOverlay = document.querySelector('.toast-overlay');
                const existingToast = document.querySelector('.floating-toast');
                if (existingOverlay) existingOverlay.remove();
                if (existingToast) existingToast.remove();

                const overlay = document.createElement('div');
                overlay.className = 'toast-overlay';
                document.body.appendChild(overlay);

                const toast = document.createElement('div');
                toast.className = 'floating-toast';
                
                const icon = isCorrect ? '✅' : '❌';
                const title = isCorrect ? 'إجابة صحيحة!' : 'إجابة خاطئة';

                let messageHTML = '';
                if (isCorrect) {
                    messageHTML = `<div class="toast-message">${feedbackText}</div>`;
                } else {
                    messageHTML = `<div class="toast-message"><strong>الإجابة الصحيحة:</strong> ${correctAnswerText}<br><br>${feedbackText}</div>`;
                }

                toast.innerHTML = `
                    <div class="toast-icon">${icon}</div>
                    <div class="toast-title">${title}</div>
                    ${messageHTML}
                    <button class="toast-close-btn" id="close-toast-btn">حسناً</button>
                `;

                document.body.appendChild(toast);

                document.getElementById('close-toast-btn').addEventListener('click', function() {
                    soundManager.playOkayButton();
                    toast.remove();
                    overlay.remove();
                });

                overlay.addEventListener('click', function() {
                    toast.remove();
                    overlay.remove();
                });

                setTimeout(() => {
                    if (document.body.contains(toast)) {
                        toast.remove();
                        overlay.remove();
                    }
                }, 3500);
            }

            function showWinnerMessage() {
                const existingOverlay = document.querySelector('.toast-overlay');
                const existingToast = document.querySelector('.floating-toast');
                if (existingOverlay) existingOverlay.remove();
                if (existingToast) existingToast.remove();

                const overlay = document.createElement('div');
                overlay.className = 'toast-overlay';
                document.body.appendChild(overlay);

                const toast = document.createElement('div');
                toast.className = 'floating-toast winner-toast';
                
                const discountCode = 'SPORT' + Math.floor(1000 + Math.random() * 9000);

                toast.innerHTML = `
                    <div class="toast-icon">🏆🎉</div>
                    <div class="toast-title">مبروك! أنت الفائز!</div>
                    <div class="toast-message">
                        جميع إجاباتك صحيحة!<br>
                        <span style="color: gold; font-size: 1.6rem; font-weight: 800; display: block; margin: 0.5rem 0;">
                            50% خصم
                        </span>
                    </div>
                    <div class="discount-code">${discountCode}</div>
                    <div class="toast-message" style="font-size: 0.85rem;">
                        استخدم الكود عند الدفع (7 أيام)
                    </div>
                    <button class="toast-close-btn" id="close-toast-btn" style="background: gold; color: #1e2c35; border-color: #ffd966; box-shadow: 0 3px 0 #b8860b;">أحسنت! 🎁</button>
                `;

                document.body.appendChild(toast);

                document.getElementById('close-toast-btn').addEventListener('click', function() {
                    soundManager.playOkayButton();
                    toast.remove();
                    overlay.remove();
                });

                overlay.addEventListener('click', function() {
                    toast.remove();
                    overlay.remove();
                });
            }

            function renderQuestion() {
                answered = false;
                const q = questions[currentIdx];
                qText.textContent = q.question;
                currentQSpan.textContent = currentIdx + 1;
                const progressPercent = (currentIdx / totalQ) * 100;
                progressFill.style.width = progressPercent + '%';

                optsDiv.innerHTML = '';

                q.options.forEach((opt, idx) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.textContent = opt;
                    btn.setAttribute('data-index', idx);
                    btn.addEventListener('click', () => {
                        if (!answered) handleAnswer(idx);
                    });
                    optsDiv.appendChild(btn);
                });
            }

            function handleAnswer(selectedIdx) {
                if (answered) return;
                answered = true;
                const q = questions[currentIdx];
                const isCorrect = (selectedIdx === q.correct);

                if (isCorrect) {
                    soundManager.playCorrect();
                    score += 10;
                } else {
                    soundManager.playWrong();
                }
                scoreSpan.textContent = score;

                const btns = document.querySelectorAll('.option-btn');
                btns.forEach((btn, idx) => {
                    btn.disabled = true;
                    if (idx === q.correct) {
                        btn.classList.add('correct');
                    } else if (idx === selectedIdx && !isCorrect) {
                        btn.classList.add('wrong');
                    }
                });

                if (isCorrect) {
                    showFloatingMessage(true, q.feedback);
                } else {
                    showFloatingMessage(false, q.feedback, q.options[q.correct]);
                }

                setTimeout(() => {
                    if (currentIdx < totalQ - 1 && document.getElementById('next-btn') === null) {
                        const nextBtnContainer = document.createElement('div');
                        nextBtnContainer.style.display = 'flex';
                        nextBtnContainer.style.justifyContent = 'center';
                        nextBtnContainer.style.margin = '0.2rem 0';
                        
                        const nextBtn = document.createElement('button');
                        nextBtn.id = 'next-btn';
                        nextBtn.className = 'next-btn';
                        nextBtn.textContent = '⬅️ السؤال التالي';
                        nextBtn.addEventListener('click', () => {
                            soundManager.playNext();
                            currentIdx++;
                            renderQuestion();
                        });
                        
                        nextBtnContainer.appendChild(nextBtn);
                        optsDiv.insertAdjacentElement('afterend', nextBtnContainer);
                    } else if (currentIdx === totalQ - 1) {
                        setTimeout(() => {
                            if (currentIdx === totalQ - 1) {
                                showFinalResult();
                            }
                        }, 1500);
                    }
                }, 600);
            }

            function showFinalResult() {
                const maxScore = totalQ * 10;
                const allCorrect = (score === maxScore);
                
                if (allCorrect) {
                    soundManager.playWinnerSound();
                    showWinnerMessage();
                }
                
                qText.textContent = `✨ انتهى الاختبار! ✨`;
                optsDiv.innerHTML = '';
                
                const nextBtn = document.getElementById('next-btn');
                if (nextBtn) nextBtn.remove();
                
                const resultCard = document.createElement('div');
                resultCard.style.background = '#1d3643';
                resultCard.style.borderRight = allCorrect ? '6px solid gold' : '6px solid #ffb347';
                resultCard.style.padding = '0.8rem 0.8rem';
                resultCard.style.borderRadius = '1.2rem';
                resultCard.style.margin = '0.3rem 0';
                resultCard.style.color = '#e1f0fc';
                resultCard.style.fontSize = '0.95rem';
                resultCard.style.textAlign = 'center';
                resultCard.style.border = '1px solid #3e6375';
                
                if (allCorrect) {
                    resultCard.innerHTML = `
                        <div style="font-size:1.8rem;">🏆🎉</div>
                        <div style="font-size:1.6rem; font-weight:700; color:gold;">${score}/${maxScore}</div>
                        <div style="margin:0.3rem 0; color:gold;">إجابة كاملة! أحسنت!</div>
                    `;
                } else {
                    let grade = score >= 40 ? '💪 جيد جداً!' : score >= 30 ? '👍 جيد' : '🧐 حاول مرة أخرى';
                    resultCard.innerHTML = `
                        <div style="font-size:1.5rem;">${score >= 40 ? '💪' : score >= 30 ? '👍' : '🧐'}</div>
                        <div style="font-size:1.5rem; font-weight:700; color:#ffb347;">${score}/${maxScore}</div>
                        <div style="margin:0.2rem 0;">${grade}</div>
                    `;
                }
                
                optsDiv.appendChild(resultCard);
                progressFill.style.width = '100%';
            }

            function restartGame() {
                soundManager.playRestart();
                
                currentIdx = 0;
                score = 0;
                answered = false;
                scoreSpan.textContent = '0';
                progressFill.style.width = '0%';
                
                const nextBtn = document.getElementById('next-btn');
                if (nextBtn) nextBtn.remove();
                
                const overlay = document.querySelector('.toast-overlay');
                const toast = document.querySelector('.floating-toast');
                if (overlay) overlay.remove();
                if (toast) toast.remove();
                
                renderQuestion();
            }

            restartBtn.addEventListener('click', restartGame);
            renderQuestion();

            document.addEventListener('click', function initAudio() {
                soundManager.init();
            }, { once: true });
        })();
    </script>
</body>
</html>
