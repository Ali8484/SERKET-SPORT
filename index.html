<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>🏋️ اختبار Serket Sport | 5 أسئلة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a2f3f 0%, #0f2835 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0.8rem;
            position: relative;
        }

        .game-container {
            max-width: 950px;
            width: 100%;
            background: rgba(10, 30, 40, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 180, 70, 0.25);
            border-radius: clamp(1.5rem, 5vw, 2.8rem);
            padding: clamp(1.2rem, 4vw, 2.5rem);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.6), inset 0 1px 2px rgba(255, 215, 150, 0.15);
        }

        /* شعار ورأس اللعبة */
        .game-header {
            text-align: center;
            margin-bottom: clamp(1rem, 3vh, 2rem);
        }

        .game-title {
            font-size: clamp(1.8rem, 7vw, 2.8rem);
            font-weight: 800;
            background: linear-gradient(135deg, #ffb347, #ffa01e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 4px 15px rgba(255, 160, 30, 0.3);
            letter-spacing: -0.5px;
            line-height: 1.2;
        }

        .store-badge {
            display: inline-block;
            background: #233b48;
            color: #ffbc6c;
            font-weight: 600;
            font-size: clamp(0.9rem, 3.5vw, 1.2rem);
            padding: 0.5rem 1.8rem;
            border-radius: 50px;
            border: 1px solid #ffb34780;
            box-shadow: 0 4px 12px #00000040;
            margin-top: 0.5rem;
            backdrop-filter: blur(4px);
        }

        /* شريط التقدم والنتيجة */
        .stats-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 0.8rem 1rem;
            background: #1d3643;
            padding: 0.9rem 1.5rem;
            border-radius: 60px;
            border: 1px solid #3f6375;
            margin-bottom: 1.5rem;
            box-shadow: inset 0 2px 5px #0f1f28;
        }

        .question-counter {
            color: #d4e9ff;
            font-size: clamp(1rem, 3.5vw, 1.3rem);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .counter-number {
            background: #ffb347;
            color: #1e2c35;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            font-weight: 700;
            margin-right: 0.5rem;
        }

        .score-badge {
            background: #ffb347;
            color: #1e2c35;
            padding: 0.3rem 1.5rem;
            border-radius: 40px;
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            font-weight: 700;
            min-width: 70px;
            text-align: center;
            box-shadow: 0 3px 0 #b16f1a;
        }

        .progress-track {
            width: 100%;
            height: 12px;
            background: #1d3643;
            border-radius: 20px;
            margin: 0.8rem 0 1.8rem;
            overflow: hidden;
            border: 1px solid #3e6375;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffbc6c, #ff9f3d);
            width: 0%;
            border-radius: 20px;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 12px #ffb347;
        }

        /* بطاقة السؤال */
        .question-card {
            background: #233b48;
            border-radius: clamp(1.5rem, 5vw, 2.2rem);
            padding: clamp(1.5rem, 4vw, 2.5rem) clamp(1.2rem, 3vw, 2rem);
            border: 1px solid #3f5a68;
            box-shadow: inset 0 3px 8px #10232e, 0 12px 25px -10px #0a1e28;
            margin-bottom: 1.8rem;
        }

        #question-text {
            font-size: clamp(1.3rem, 4.5vw, 1.9rem);
            line-height: 1.5;
            color: #f0f9ff;
            font-weight: 600;
            text-shadow: 0 2px 5px black;
            word-break: break-word;
        }

        /* منطقة الخيارات (الأزرار) */
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
            margin: 1.8rem 0 1.5rem;
        }

        .option-btn {
            background: #eef2f6;
            border: none;
            border-radius: 60px;
            padding: 1rem 1.8rem;
            font-size: clamp(1rem, 4vw, 1.3rem);
            font-weight: 600;
            color: #1e2f3c;
            text-align: right;
            cursor: pointer;
            transition: all 0.15s ease;
            border: 2px solid transparent;
            box-shadow: 0 5px 0 #9aabbb, 0 8px 16px -5px #000000b0;
            width: 100%;
            line-height: 1.4;
            word-break: break-word;
        }

        .option-btn:hover:not(:disabled) {
            background: #ffffff;
            transform: translateY(-3px);
            box-shadow: 0 7px 0 #8399ab, 0 14px 22px -8px black;
        }

        .option-btn:active:not(:disabled) {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #8399ab, 0 6px 12px -4px black;
        }

        /* أنماط خاصة للأجهزة اللمسية */
        @media (hover: none) and (pointer: coarse) {
            .option-btn:hover:not(:disabled) {
                transform: none;
                box-shadow: 0 5px 0 #9aabbb, 0 8px 16px -5px #000000b0;
                background: #eef2f6;
            }
            .option-btn:active:not(:disabled) {
                transform: translateY(3px);
                box-shadow: 0 2px 0 #8399ab, 0 6px 12px -4px black;
                background: #d6e0e9;
            }
        }

        .option-btn.correct {
            background: #2e7d5a;
            color: white;
            border-color: #6ec89b;
            box-shadow: 0 3px 0 #1b5e3f;
            pointer-events: none;
        }

        .option-btn.wrong {
            background: #b53b3b;
            color: white;
            border-color: #e08a8a;
            box-shadow: 0 3px 0 #832525;
            pointer-events: none;
        }

        .option-btn:disabled {
            opacity: 0.9;
            cursor: not-allowed;
        }

        /* زر السؤال التالي */
        .next-btn {
            background: #ffb347;
            border: none;
            border-radius: 50px;
            padding: 0.9rem 2rem;
            font-size: clamp(1.1rem, 4vw, 1.3rem);
            font-weight: 700;
            color: #1e2c35;
            margin: 0.8rem auto 0.5rem;
            cursor: pointer;
            border: 2px solid #ffcf8a;
            box-shadow: 0 5px 0 #b16f1a;
            transition: 0.1s ease;
            width: fit-content;
            min-width: 180px;
            text-align: center;
            display: block;
        }

        .next-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #b16f1a;
        }

        /* شارات المزايا (متجاوبة) */
        .features-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.6rem 1rem;
            margin: 2rem 0 1rem;
        }

        .feature-item {
            background: #1d3643;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            color: #bcd8e9;
            font-size: clamp(0.75rem, 2.5vw, 0.95rem);
            font-weight: 500;
            border: 1px solid #3e6375;
            white-space: nowrap;
        }
        @media (max-width: 450px) {
            .feature-item { white-space: normal; text-align: center; }
        }

        .feature-item i {
            font-style: normal;
            color: #ffbc6c;
            margin-left: 5px;
        }

        /* زر إعادة التشغيل */
        .restart-btn {
            background: #2e4b5c;
            border: 2px solid #547888;
            color: #eaf2f7;
            font-size: clamp(1rem, 4vw, 1.3rem);
            font-weight: 600;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            width: fit-content;
            margin: 1.5rem auto 0.5rem;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 5px 0 #17323f;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: none;
        }

        .restart-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #17323f;
        }

        .footer-note {
            text-align: center;
            color: #7fa3b8;
            font-size: clamp(0.8rem, 2.8vw, 1rem);
            margin-top: 1.2rem;
            border-top: 1px dashed #3f6375;
            padding-top: 1rem;
        }

        /* ========== الرسالة العائمة المنبثقة (Toast) ========== */
        .floating-toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 9999;
            max-width: 450px;
            width: 90%;
            background: #233b48;
            border: 3px solid #ffb347;
            border-radius: 40px;
            padding: 2rem 1.5rem;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.9), 0 0 0 8px rgba(255, 180, 70, 0.25);
            color: white;
            text-align: center;
            animation: toastPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            backdrop-filter: blur(15px);
            border-left: 3px solid #ffb347;
            border-bottom: 3px solid #ffb347;
        }

        /* رسالة خاصة للفوز (تختلف في التصميم) */
        .floating-toast.winner-toast {
            border: 4px solid gold;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.9), 0 0 0 12px rgba(255, 215, 0, 0.3);
            background: linear-gradient(145deg, #1d3a48, #233b48);
        }

        @keyframes toastPop {
            0% {
                opacity: 0;
                transform: translate(-50%, -30%) scale(0.7);
            }
            100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .toast-icon {
            font-size: 4rem;
            margin-bottom: 0.8rem;
            line-height: 1;
            animation: iconPulse 1.5s infinite;
        }

        @keyframes iconPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .toast-title {
            font-size: 2rem;
            font-weight: 800;
            color: #ffb347;
            margin-bottom: 0.8rem;
            text-shadow: 0 2px 10px rgba(255, 180, 70, 0.5);
        }

        .winner-toast .toast-title {
            color: gold;
            font-size: 2.2rem;
        }

        .toast-message {
            font-size: 1.2rem;
            line-height: 1.7;
            color: #e1f0fc;
            margin-bottom: 1.5rem;
        }

        .discount-code {
            background: #1d2f3a;
            border: 2px dashed #ffb347;
            border-radius: 60px;
            padding: 1rem;
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 4px;
            color: #ffb347;
            margin: 1.2rem 0;
            direction: ltr;
            box-shadow: inset 0 2px 8px #00000060;
        }

        .winner-toast .discount-code {
            border-color: gold;
            color: gold;
        }

        .toast-correct {
            border-right: 6px solid #4caf50;
        }
        .toast-wrong {
            border-right: 6px solid #f44336;
        }

        .toast-close-btn {
            background: #ffb347;
            border: none;
            color: #1e2c35;
            font-weight: 700;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-size: 1.2rem;
            margin-top: 1rem;
            cursor: pointer;
            border: 2px solid #ffd89c;
            box-shadow: 0 4px 0 #b16f1a;
            transition: 0.1s;
            min-width: 140px;
        }

        .toast-close-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #b16f1a;
        }

        /* تراك خلفي خفيف خلف الرسالة */
        .toast-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 9998;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* زر التحكم بالصوت */
        .sound-control {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 0.8rem;
        }

        .sound-toggle {
            background: #1d3643;
            border: 1px solid #ffb34780;
            color: #ffbc6c;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 3px 0 #0f1f28;
        }

        .sound-toggle:active {
            transform: translateY(3px);
            box-shadow: 0 0px 0 #0f1f28;
        }

        .sound-toggle.muted {
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <div class="game-title">⚡ SERKET SPORT ⚡</div>
            <span class="store-badge">🏋️ 5 أسئلة - أهم المزايا</span>
        </div>

        <!-- زر التحكم بالصوت -->
        <div class="sound-control">
            <div class="sound-toggle" id="sound-toggle">🔊</div>
        </div>

        <!-- الإحصائيات -->
        <div class="stats-bar">
            <div class="question-counter">
                <span class="counter-number" id="current-q">1</span>
                <span>/</span>
                <span id="total-q">5</span>
            </div>
            <div class="score-badge" id="score-display">0</div>
        </div>
        <div class="progress-track">
            <div class="progress-fill" id="progress-fill" style="width: 0%;"></div>
        </div>

        <!-- السؤال -->
        <div class="question-card">
            <div id="question-text">جاري تحميل الأسئلة...</div>
        </div>

        <!-- الخيارات -->
        <div class="options-grid" id="options-container"></div>

        <!-- شارات الخدمات -->
        <div class="features-grid">
            <span class="feature-item"><i>🔧</i> تركيب مجاني</span>
            <span class="feature-item"><i>⚡</i> تقسيط بدون فوائد</span>
            <span class="feature-item"><i>🛡️</i> ضمان سنتين</span>
            <span class="feature-item"><i>🚚</i> شحن سريع</span>
            <span class="feature-item"><i>💬</i> استشارات واتساب</span>
            <span class="feature-item"><i>🔄</i> إرجاع 14 يوم</span>
        </div>

        <!-- زر إعادة التشغيل -->
        <button class="restart-btn" id="restart-game">
            <span>↻</span> ابدأ اختباراً جديداً
        </button>
        <div class="footer-note">"رياضتك .. أسلوب حياتك"</div>
    </div>

    <script>
        (function() {
            // ========== نظام الصوت المتطور ==========
            class SoundManager {
                constructor() {
                    this.muted = false;
                    this.audioCtx = null;
                    this.initialized = false;
                }

                // تهيئة AudioContext (يتم عند أول تفاعل)
                init() {
                    if (this.initialized) return;
                    try {
                        this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                        this.initialized = true;
                    } catch (e) {
                        console.log('Web Audio API not supported');
                    }
                }

                // التأكد من تشغيل السياق
                ensureContext() {
                    if (!this.audioCtx) this.init();
                    if (this.audioCtx && this.audioCtx.state === 'suspended') {
                        this.audioCtx.resume();
                    }
                }

                // صوت الإجابة الصحيحة (نغمة صاعدة)
                playCorrect() {
                    if (this.muted || !this.audioCtx) return;
                    this.ensureContext();
                    
                    const now = this.audioCtx.currentTime;
                    
                    // نغمة ثلاثية صاعدة
                    [523.25, 659.25, 783.99].forEach((freq, i) => {
                        const osc = this.audioCtx.createOscillator();
                        const gain = this.audioCtx.createGain();
                        
                        osc.type = 'sine';
                        osc.frequency.value = freq;
                        
                        gain.gain.setValueAtTime(0.25, now + i * 0.1);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.1 + 0.3);
                        
                        osc.connect(gain);
                        gain.connect(this.audioCtx.destination);
                        
                        osc.start(now + i * 0.1);
                        osc.stop(now + i * 0.1 + 0.3);
                    });
                }

                // صوت الإجابة الخاطئة (نغمة هابطة)
                playWrong() {
                    if (this.muted || !this.audioCtx) return;
                    this.ensureContext();
                    
                    const now = this.audioCtx.currentTime;
                    
                    // نغمة مزعجة قليلاً
                    const osc = this.audioCtx.createOscillator();
                    const gain = this.audioCtx.createGain();
                    
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(261.63, now);
                    osc.frequency.setValueAtTime(196.00, now + 0.1);
                    osc.frequency.setValueAtTime(146.83, now + 0.2);
                    
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                    
                    osc.connect(gain);
                    gain.connect(this.audioCtx.destination);
                    
                    osc.start(now);
                    osc.stop(now + 0.4);
                }

                // صوت زر "حسناً" في الرسالة العائمة
                playOkayButton() {
                    if (this.muted || !this.audioCtx) return;
                    this.ensureContext();
                    
                    const now = this.audioCtx.currentTime;
                    
                    // صوت لطيف ومميز
                    const osc1 = this.audioCtx.createOscillator();
                    const osc2 = this.audioCtx.createOscillator();
                    const gain = this.audioCtx.createGain();
                    
                    osc1.type = 'sine';
                    osc1.frequency.value = 659.25; // E5
                    
                    osc2.type = 'triangle';
                    osc2.frequency.value = 523.25; // C5
                    
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.setValueAtTime(0.12, now + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                    
                    osc1.connect(gain);
                    osc2.connect(gain);
                    gain.connect(this.audioCtx.destination);
                    
                    osc1.start(now);
                    osc2.start(now);
                    osc1.stop(now + 0.2);
                    osc2.stop(now + 0.2);
                    
                    // نغمة قصيرة إضافية
                    const osc3 = this.audioCtx.createOscillator();
                    const gain2 = this.audioCtx.createGain();
                    osc3.type = 'sine';
                    osc3.frequency.value = 783.99; // G5
                    gain2.gain.setValueAtTime(0.1, now + 0.1);
                    gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                    osc3.connect(gain2);
                    gain2.connect(this.audioCtx.destination);
                    osc3.start(now + 0.1);
                    osc3.stop(now + 0.2);
                }

                // صوت الانتقال للسؤال التالي
                playNext() {
                    if (this.muted || !this.audioCtx) return;
                    this.ensureContext();
                    
                    const now = this.audioCtx.currentTime;
                    const osc = this.audioCtx.createOscillator();
                    const gain = this.audioCtx.createGain();
                    
                    osc.type = 'triangle';
                    osc.frequency.value = 392.00; // G4
                    
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                    
                    osc.connect(gain);
                    gain.connect(this.audioCtx.destination);
                    
                    osc.start(now);
                    osc.stop(now + 0.15);
                }

                // صوت إعادة التشغيل
                playRestart() {
                    if (this.muted || !this.audioCtx) return;
                    this.ensureContext();
                    
                    const now = this.audioCtx.currentTime;
                    
                    [523.25, 659.25, 783.99].forEach((freq, i) => {
                        const osc = this.audioCtx.createOscillator();
                        const gain = this.audioCtx.createGain();
                        
                        osc.type = 'sine';
                        osc.frequency.value = freq;
                        
                        gain.gain.setValueAtTime(0.2, now + i * 0.1);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.1 + 0.2);
                        
                        osc.connect(gain);
                        gain.connect(this.audioCtx.destination);
                        
                        osc.start(now + i * 0.1);
                        osc.stop(now + i * 0.1 + 0.2);
                    });
                }

                // صوت نهاية الاختبار (عادي)
                playComplete() {
                    if (this.muted || !this.audioCtx) return;
                    this.ensureContext();
                    
                    const now = this.audioCtx.currentTime;
                    
                    const notes = [523.25, 659.25, 783.99, 1046.50];
                    notes.forEach((freq, i) => {
                        const osc = this.audioCtx.createOscillator();
                        const gain = this.audioCtx.createGain();
                        
                        osc.type = 'sine';
                        osc.frequency.value = freq;
                        
                        gain.gain.setValueAtTime(0.2, now + i * 0.12);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.12 + 0.25);
                        
                        osc.connect(gain);
                        gain.connect(this.audioCtx.destination);
                        
                        osc.start(now + i * 0.12);
                        osc.stop(now + i * 0.12 + 0.25);
                    });
                }

                // صوت خاص للفوز (نغمة انتصار مبهرة)
                playWinnerSound() {
                    if (this.muted || !this.audioCtx) return;
                    this.ensureContext();
                    
                    const now = this.audioCtx.currentTime;
                    
                    // لحن انتصار رائع
                    const notes = [523.25, 659.25, 783.99, 1046.50, 1318.51, 1567.98];
                    notes.forEach((freq, i) => {
                        const osc = this.audioCtx.createOscillator();
                        const gain = this.audioCtx.createGain();
                        
                        osc.type = i % 2 === 0 ? 'sine' : 'triangle';
                        osc.frequency.value = freq;
                        
                        gain.gain.setValueAtTime(0.25, now + i * 0.1);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.1 + 0.4);
                        
                        osc.connect(gain);
                        gain.connect(this.audioCtx.destination);
                        
                        osc.start(now + i * 0.1);
                        osc.stop(now + i * 0.1 + 0.4);
                    });
                    
                    // إضافة نغمات إضافية للاحتفال
                    setTimeout(() => {
                        if (this.muted) return;
                        const oscLow = this.audioCtx.createOscillator();
                        const gainLow = this.audioCtx.createGain();
                        oscLow.type = 'sine';
                        oscLow.frequency.value = 392.00;
                        gainLow.gain.setValueAtTime(0.15, this.audioCtx.currentTime);
                        gainLow.gain.exponentialRampToValueAtTime(0.01, this.audioCtx.currentTime + 0.8);
                        oscLow.connect(gainLow);
                        gainLow.connect(this.audioCtx.destination);
                        oscLow.start();
                        oscLow.stop(this.audioCtx.currentTime + 0.8);
                    }, 600);
                }

                toggleMute() {
                    this.muted = !this.muted;
                    return this.muted;
                }
            }

            // إنشاء مدير الصوت
            const soundManager = new SoundManager();

            // ========== أهم 5 مزايا للمتجر الرياضي ==========
            const questions = [
                {
                    question: "🔧 ما هي الخدمة الإضافية التي يوفرها المتجر عند شراء الأجهزة الكبيرة (مثل السير الكهربائي)؟",
                    options: [
                        "تركيب مجاني في المنزل",
                        "مدرب شخصي لمدة شهر", 
                        "عضوية مجانية في نادي صحي",
                        "هدية دمبلز 5 كغم"
                    ],
                    correct: 0,
                    feedback: "✅ فريق المتجر المتخصص يقوم بتركيب الأجهزة المنزلية الثقيلة مجاناً في الموقع الذي تحدده!"
                },
                {
                    question: "⚡ ما هي شركات التقسيط الرقمية التي يتعاون معها المتجر للدفع بدون فوائد؟",
                    options: [
                        "تمارا فقط",
                        "تابي فقط", 
                        "تابي وتمارا معاً",
                        "فيونس وتمارا"
                    ],
                    correct: 2,
                    feedback: "✅ المتجر يتعاون مع تابي وتمارا لتوفير خطط تقسيط مريحة بدون فوائد على معظم المنتجات."
                },
                {
                    question: "🛡️ ما هي مدة الضمان التي يوفرها المتجر على الأجهزة الكهربائية؟",
                    options: [
                        "سنة واحدة فقط",
                        "سنتان كاملتان", 
                        "6 أشهر فقط",
                        "3 سنوات مع إمكانية التمديد"
                    ],
                    correct: 1,
                    feedback: "✅ المتجر يوفر ضمان يصل إلى سنتين على الأجهزة الكهربائية، مما يعكس ثقتهم بجودة المنتجات!"
                },
                {
                    question: "🔄 ما هي المهلة المتاحة لسياسة الإرجاع والتبادل (بشرط أن تكون المنتجات بحالة جيدة)؟",
                    options: [
                        "7 أيام فقط",
                        "14 يوماً (أسبوعان)", 
                        "30 يوماً كاملاً",
                        "يومان فقط"
                    ],
                    correct: 1,
                    feedback: "✅ يمكنك إرجاع أو استبدال المنتجات خلال 14 يومًا من تاريخ الشراء، طالما أنها بحالتها الأصلية."
                },
                {
                    question: "💬 أي من هذه الخدمات يقدمها المتجر لدعم العملاء ومساعدتهم في الاختيار؟",
                    options: [
                        "دعم عبر الواتساب واستشارات فنية",
                        "زيارات منزلية أسبوعية", 
                        "خط ساخن 24/7 مع فيديو كول",
                        "مدرب خاص يرافقك للنادي"
                    ],
                    correct: 0,
                    feedback: "✅ يوفر المتجر فريق دعم عبر الواتساب للإجابة عن استفساراتكم وتقديم استشارات حول اختيار المعدات المناسبة."
                }
            ];

            // متغيرات اللعبة
            let currentIdx = 0;
            let score = 0;
            let answered = false;
            const totalQ = questions.length;

            // عناصر DOM
            const qText = document.getElementById('question-text');
            const optsDiv = document.getElementById('options-container');
            const scoreSpan = document.getElementById('score-display');
            const currentQSpan = document.getElementById('current-q');
            const totalQSpan = document.getElementById('total-q');
            const progressFill = document.getElementById('progress-fill');
            const restartBtn = document.getElementById('restart-game');
            const soundToggle = document.getElementById('sound-toggle');

            totalQSpan.textContent = totalQ;

            // التحكم بالصوت
            soundToggle.addEventListener('click', () => {
                const muted = soundManager.toggleMute();
                soundToggle.textContent = muted ? '🔇' : '🔊';
                soundToggle.classList.toggle('muted', muted);
            });

            // دالة لعرض رسالة عائمة منبثقة
            function showFloatingMessage(isCorrect, feedbackText, correctAnswerText = null) {
                // إزالة أي رسالة سابقة
                const existingOverlay = document.querySelector('.toast-overlay');
                const existingToast = document.querySelector('.floating-toast');
                if (existingOverlay) existingOverlay.remove();
                if (existingToast) existingToast.remove();

                // إنشاء طبقة خلفية معتمة (overlay)
                const overlay = document.createElement('div');
                overlay.className = 'toast-overlay';
                document.body.appendChild(overlay);

                // إنشاء عنصر الرسالة
                const toast = document.createElement('div');
                toast.className = 'floating-toast';
                if (isCorrect) {
                    toast.classList.add('toast-correct');
                } else {
                    toast.classList.add('toast-wrong');
                }

                // أيقونة حسب نتيجة الإجابة
                const icon = isCorrect ? '✅' : '❌';
                const title = isCorrect ? 'إجابة صحيحة!' : 'إجابة خاطئة';

                // محتوى الرسالة
                let messageHTML = '';
                if (isCorrect) {
                    messageHTML = `<div class="toast-message">${feedbackText}</div>`;
                } else {
                    messageHTML = `<div class="toast-message"><strong>الإجابة الصحيحة:</strong> ${correctAnswerText}<br><br>${feedbackText}</div>`;
                }

                toast.innerHTML = `
                    <div class="toast-icon">${icon}</div>
                    <div class="toast-title">${title}</div>
                    ${messageHTML}
                    <button class="toast-close-btn" id="close-toast-btn">حسناً</button>
                `;

                document.body.appendChild(toast);

                // إغلاق الرسالة عند الضغط على الزر مع صوت مميز
                document.getElementById('close-toast-btn').addEventListener('click', function() {
                    soundManager.playOkayButton();
                    toast.remove();
                    overlay.remove();
                });

                // إغلاق الرسالة عند الضغط على الخلفية (بدون صوت)
                overlay.addEventListener('click', function() {
                    toast.remove();
                    overlay.remove();
                });

                // إغلاق تلقائي بعد 4 ثواني
                setTimeout(() => {
                    if (document.body.contains(toast)) {
                        toast.remove();
                        overlay.remove();
                    }
                }, 4000);
            }

            // دالة خاصة لعرض رسالة الفوز (خصم 50%)
            function showWinnerMessage() {
                // إزالة أي رسالة سابقة
                const existingOverlay = document.querySelector('.toast-overlay');
                const existingToast = document.querySelector('.floating-toast');
                if (existingOverlay) existingOverlay.remove();
                if (existingToast) existingToast.remove();

                // إنشاء طبقة خلفية معتمة
                const overlay = document.createElement('div');
                overlay.className = 'toast-overlay';
                document.body.appendChild(overlay);

                // إنشاء رسالة الفوز
                const toast = document.createElement('div');
                toast.className = 'floating-toast winner-toast';
                
                // إنشاء كود خصم عشوائي
                const discountCode = 'SPORT' + Math.floor(1000 + Math.random() * 9000);

                toast.innerHTML = `
                    <div class="toast-icon">🏆🎉</div>
                    <div class="toast-title">مبروك! أنت الفائز!</div>
                    <div class="toast-message" style="font-size: 1.3rem;">
                        لقد أجبت على جميع الأسئلة بشكل صحيح!<br>
                        <span style="color: gold; font-size: 1.8rem; font-weight: 800; display: block; margin: 1rem 0;">
                            خصم 50%
                        </span>
                        على أول عملية شراء من متجرنا!
                    </div>
                    <div class="discount-code">${discountCode}</div>
                    <div class="toast-message" style="font-size: 1rem;">
                        استخدم الكود أعلاه عند الدفع<br>
                        (ساري لمدة 7 أيام)
                    </div>
                    <button class="toast-close-btn" id="close-toast-btn" style="background: gold; color: #1e2c35; border-color: #ffd966; box-shadow: 0 4px 0 #b8860b;">أحسنت! 🎁</button>
                `;

                document.body.appendChild(toast);

                // إغلاق الرسالة عند الضغط على الزر
                document.getElementById('close-toast-btn').addEventListener('click', function() {
                    soundManager.playOkayButton();
                    toast.remove();
                    overlay.remove();
                });

                // إغلاق الرسالة عند الضغط على الخلفية
                overlay.addEventListener('click', function() {
                    toast.remove();
                    overlay.remove();
                });
            }

            // عرض السؤال
            function renderQuestion() {
                answered = false;
                const q = questions[currentIdx];
                qText.textContent = q.question;
                currentQSpan.textContent = currentIdx + 1;
                const progressPercent = (currentIdx / totalQ) * 100;
                progressFill.style.width = progressPercent + '%';

                optsDiv.innerHTML = '';

                q.options.forEach((opt, idx) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.textContent = opt;
                    btn.setAttribute('data-index', idx);
                    btn.addEventListener('click', () => {
                        if (!answered) handleAnswer(idx);
                    });
                    optsDiv.appendChild(btn);
                });
            }

            // معالجة الإجابة
            function handleAnswer(selectedIdx) {
                if (answered) return;
                answered = true;
                const q = questions[currentIdx];
                const isCorrect = (selectedIdx === q.correct);

                // تشغيل الصوت المناسب
                if (isCorrect) {
                    soundManager.playCorrect();
                } else {
                    soundManager.playWrong();
                }

                if (isCorrect) {
                    score += 10;
                }
                scoreSpan.textContent = score;

                // تلوين الأزرار
                const btns = document.querySelectorAll('.option-btn');
                btns.forEach((btn, idx) => {
                    btn.disabled = true;
                    if (idx === q.correct) {
                        btn.classList.add('correct');
                    } else if (idx === selectedIdx && !isCorrect) {
                        btn.classList.add('wrong');
                    }
                });

                // عرض الرسالة العائمة
                if (isCorrect) {
                    showFloatingMessage(true, q.feedback);
                } else {
                    const correctAns = q.options[q.correct];
                    showFloatingMessage(false, q.feedback, correctAns);
                }

                // إضافة زر "التالي" إذا لم يكن السؤال الأخير
                setTimeout(() => {
                    if (currentIdx < totalQ - 1 && document.getElementById('next-btn') === null) {
                        const nextBtnContainer = document.createElement('div');
                        nextBtnContainer.style.display = 'flex';
                        nextBtnContainer.style.justifyContent = 'center';
                        nextBtnContainer.style.marginTop = '1rem';
                        
                        const nextBtn = document.createElement('button');
                        nextBtn.id = 'next-btn';
                        nextBtn.className = 'next-btn';
                        nextBtn.textContent = '⬅️ السؤال التالي';
                        nextBtn.addEventListener('click', () => {
                            soundManager.playNext();
                            currentIdx++;
                            renderQuestion();
                        });
                        
                        nextBtnContainer.appendChild(nextBtn);
                        optsDiv.insertAdjacentElement('afterend', nextBtnContainer);
                    } else if (currentIdx === totalQ - 1) {
                        // إذا كان الأخير، نعرض النتيجة
                        setTimeout(() => {
                            if (currentIdx === totalQ - 1) {
                                showFinalResult();
                            }
                        }, 2000);
                    }
                }, 800);
            }

            // عرض النتيجة النهائية
            function showFinalResult() {
                const maxScore = totalQ * 10;
                const percent = (score / maxScore) * 100;
                
                // التحقق إذا كان اللاعب قد أجاب على جميع الأسئلة بشكل صحيح
                const allCorrect = (score === maxScore);
                
                if (allCorrect) {
                    // تشغيل صوت الفوز الخاص
                    soundManager.playWinnerSound();
                    // عرض رسالة الفوز مع الخصم
                    showWinnerMessage();
                } else {
                    soundManager.playComplete();
                }
                
                let grade = '';
                let gradeIcon = '';
                
                if (percent >= 90) {
                    grade = 'خبير رياضي ممتاز!';
                    gradeIcon = '🏆';
                } else if (percent >= 70) {
                    grade = 'جيد جداً!';
                    gradeIcon = '💪';
                } else if (percent >= 50) {
                    grade = 'جيد';
                    gradeIcon = '👍';
                } else {
                    grade = 'قم بزيارة المتجر لتعرف أكثر';
                    gradeIcon = '🧐';
                }

                qText.textContent = `✨ انتهى الاختبار! ✨`;
                optsDiv.innerHTML = '';
                
                // إزالة أي زر تالي موجود
                const nextBtn = document.getElementById('next-btn');
                if (nextBtn) nextBtn.remove();
                
                // عرض النتيجة في بطاقة
                const resultCard = document.createElement('div');
                resultCard.className = 'feedback-card';
                resultCard.style.background = '#1d3643';
                resultCard.style.borderRight = allCorrect ? '6px solid gold' : '6px solid #ffb347';
                resultCard.style.padding = '1.5rem 1.5rem';
                resultCard.style.borderRadius = '1.5rem';
                resultCard.style.margin = '1.5rem 0 1.2rem';
                resultCard.style.color = '#e1f0fc';
                resultCard.style.fontSize = 'clamp(1rem, 3.5vw, 1.2rem)';
                resultCard.style.textAlign = 'center';
                resultCard.style.border = '1px solid #3e6375';
                
                let resultMessage = '';
                if (allCorrect) {
                    resultMessage = `
                        <div style="font-size:clamp(2rem, 8vw, 3rem); margin-bottom: 0.5rem;">🏆🎉</div>
                        <div style="font-size:clamp(1.8rem, 6vw, 2.5rem); font-weight: 700; color: gold;">${score} / ${maxScore}</div>
                        <div style="font-size:1.4rem; margin:1rem 0; color: gold;">إجابة كاملة! أحسنت!</div>
                        <div style="margin: 1rem 0; padding: 1rem; background: #233b48; border-radius: 60px; border: 2px dashed gold;">
                            <span style="color: gold; font-size: 1.5rem;">✨ خصم 50% في انتظارك ✨</span>
                        </div>
                    `;
                } else {
                    resultMessage = `
                        <div style="font-size:clamp(2rem, 8vw, 3rem); margin-bottom: 0.5rem;">${gradeIcon}</div>
                        <div style="font-size:clamp(1.8rem, 6vw, 2.5rem); font-weight: 700; color: #ffb347;">${score} / ${maxScore}</div>
                        <div style="font-size:1.4rem; margin:1rem 0; color: white;">${grade}</div>
                    `;
                }
                
                resultCard.innerHTML = resultMessage + `
                    <div style="margin-top:1.5rem; display: flex; flex-wrap: wrap; gap: 0.8rem; justify-content: center;">
                        <span style="background: #233b48; padding: 0.4rem 1rem; border-radius: 40px;">🔧 تركيب مجاني</span>
                        <span style="background: #233b48; padding: 0.4rem 1rem; border-radius: 40px;">⚡ تقسيط</span>
                        <span style="background: #233b48; padding: 0.4rem 1rem; border-radius: 40px;">🛡️ ضمان سنتين</span>
                    </div>
                    <div style="margin-top: 1.2rem;">🔄 اضغط على "ابدأ اختباراً جديداً"</div>
                `;
                optsDiv.appendChild(resultCard);
                
                progressFill.style.width = '100%';
            }

            // إعادة التشغيل
            function restartGame() {
                soundManager.playRestart();
                
                currentIdx = 0;
                score = 0;
                answered = false;
                scoreSpan.textContent = '0';
                progressFill.style.width = '0%';
                
                // إزالة أي زر تالي
                const nextBtn = document.getElementById('next-btn');
                if (nextBtn) nextBtn.remove();
                
                // إزالة أي رسالة عائمة
                const overlay = document.querySelector('.toast-overlay');
                const toast = document.querySelector('.floating-toast');
                if (overlay) overlay.remove();
                if (toast) toast.remove();
                
                renderQuestion();
            }

            // استمع لزر إعادة التشغيل
            restartBtn.addEventListener('click', restartGame);

            // بدء اللعبة
            renderQuestion();

            // تهيئة الصوت عند أول تفاعل
            document.addEventListener('click', function initAudio() {
                soundManager.init();
            }, { once: true });
        })();
    </script>
</body>
</html>
